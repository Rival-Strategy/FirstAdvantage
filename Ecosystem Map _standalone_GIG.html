document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tton class=\"cb\" data-chain=\"reclass\">The reclassification cascade<\u002Fbutton>\n<button class=\"cb\" data-chain=\"fraud\">Fraud outpaces defence<\u002Fbutton>\n<button class=\"cb\" data-chain=\"trust\">Trust without infrastructure<\u002Fbutton>\n<button class=\"cb\" data-chain=\"juris\">Jurisdictional fragmentation<\u002Fbutton>\n<button class=\"cb\" data-chain=\"state\">State actors in the pipeline<\u002Fbutton>\n<button class=\"cb\" data-chain=\"portable\">Portable identity<\u002Fbutton>\n<button class=\"rb\" id=\"rbtn\">Reset<\u002Fbutton>\n<\u002Fdiv>\n<div class=\"mx\" id=\"mx\">\n<div class=\"tt\" id=\"tip\"><\u002Fdiv>\n<svg class=\"ms\" viewBox=\"0 0 1200 960\" xmlns=\"http://www.w3.org/2000/svg\">\n<defs><marker id=\"at\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"8\" markerHeight=\"8\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"#005656\"><\u002Fpath><\u002Fmarker><\u002Fdefs>\n\n<g class=\"dg\" data-domain=\"regulators\">\n<circle cx=\"600\" cy=\"195\" r=\"155\" fill=\"#EBEBEB\" fill-opacity=\".85\"><\u002Fcircle>\n<circle cx=\"600\" cy=\"195\" r=\"155\" fill=\"none\" stroke=\"#4C4C4C\" stroke-opacity=\".3\" stroke-width=\"1\"><\u002Fcircle>\n<text x=\"600\" y=\"55\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"17\" font-weight=\"700\" fill=\"#212121\" letter-spacing=\"1.5\">The regulators<\u002Ftext>\n<text x=\"600\" y=\"75\" text-anchor=\"middle\" font-family=\"Segoe UI,Arial,sans-serif\" font-size=\"11\" font-style=\"italic\" fill=\"#4C4C4C\">Law is arriving faster than compliance infrastructure can absorb it.<\u002Ftext>\n<g class=\"fb\" data-tip=\"Presumption of employment\" data-desc=\"The single most consequential regulatory shift: EU member states must presume platform workers are employees unless platforms prove otherwise. Transposition by Dec 2026.\"><circle cx=\"548\" cy=\"160\" r=\"55\" fill=\"#fff\" stroke=\"#4C4C4C\" stroke-opacity=\".4\" class=\"fr\"><\u002Fcircle><text x=\"548\" y=\"152\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">Presumption of<\u002Ftext><text x=\"548\" y=\"166\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">employment<\u002Ftext><text x=\"548\" y=\"180\" text-anchor=\"middle\" font-family=\"Segoe UI,Arial,sans-serif\" font-size=\"8\" fill=\"#666\">(EU PWD)<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Digital identity mandated\" data-desc=\"EUDI wallet and UK DIATF are infrastructure-creating regulation — law that does not just permit identity systems but requires them.\"><circle cx=\"665\" cy=\"160\" r=\"50\" fill=\"#fff\" stroke=\"#4C4C4C\" stroke-opacity=\".4\" class=\"fr\"><\u002Fcircle><text x=\"665\" y=\"154\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">Digital identity<\u002Ftext><text x=\"665\" y=\"168\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">mandated<\u002Ftext><text x=\"665\" y=\"180\" text-anchor=\"middle\" font-family=\"Segoe UI,Arial,sans-serif\" font-size=\"8\" fill=\"#666\">(EUDI, DIATF)<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"RTW extended to gig (UK)\" data-desc=\"UK extending digital RTW checks to gig and flexible workers — pulling previously unregulated labour into formal verification.\"><circle cx=\"545\" cy=\"240\" r=\"28\" fill=\"#fff\" stroke=\"#4C4C4C\" stroke-opacity=\".25\" class=\"fr\"><\u002Fcircle><text x=\"545\" y=\"237\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">RTW to gig<\u002Ftext><text x=\"545\" y=\"248\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">(UK)<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"US classification reversal\" data-desc=\"DOL reversed its own contractor rule in May 2025, preserving independent contractor model federally while state patchwork intensifies.\"><circle cx=\"610\" cy=\"248\" r=\"26\" fill=\"#fff\" stroke=\"#4C4C4C\" stroke-opacity=\".25\" class=\"fr\"><\u002Fcircle><text x=\"610\" y=\"245\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">US reversal<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"ILO convention in motion\" data-desc=\"International Labour Organization developing a global framework for decent platform work — slower but potentially more universal.\"><circle cx=\"670\" cy=\"240\" r=\"24\" fill=\"#fff\" stroke=\"#4C4C4C\" stroke-opacity=\".2\" class=\"fr\"><\u002Fcircle><text x=\"670\" y=\"237\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"8\" fill=\"#4C4C4C\">ILO<\u002Ftext><text x=\"670\" y=\"248\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"8\" fill=\"#4C4C4C\">convention<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"State-level patchwork\" data-desc=\"CA Prop 22, MA Question Three, and 20+ conflicting state laws create a compliance maze for any platform operating nationally.\"><circle cx=\"575\" cy=\"286\" r=\"20\" fill=\"#fff\" stroke=\"#4C4C4C\" stroke-opacity=\".18\" class=\"fr\"><\u002Fcircle><text x=\"575\" y=\"284\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"8\" fill=\"#4C4C4C\">State<\u002Ftext><text x=\"575\" y=\"293\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"8\" fill=\"#4C4C4C\">patchwork<\u002Ftext><\u002Fg>\n<circle cx=\"635\" cy=\"290\" r=\"5\" fill=\"#4C4C4C\" fill-opacity=\".3\"><\u002Fcircle><circle cx=\"520\" cy=\"295\" r=\"4\" fill=\"#4C4C4C\" fill-opacity=\".22\"><\u002Fcircle><circle cx=\"660\" cy=\"280\" r=\"4\" fill=\"#4C4C4C\" fill-opacity=\".2\"><\u002Fcircle><circle cx=\"700\" cy=\"220\" r=\"3\" fill=\"#4C4C4C\" fill-opacity=\".18\"><\u002Fcircle>\n<\u002Fg>\n\n<g class=\"dg\" data-domain=\"critical\">\n<circle cx=\"965\" cy=\"280\" r=\"155\" fill=\"#F5E6E0\" fill-opacity=\".85\"><\u002Fcircle>\n<circle cx=\"965\" cy=\"280\" r=\"155\" fill=\"none\" stroke=\"#A84A2E\" stroke-opacity=\".3\" stroke-width=\"1\"><\u002Fcircle>\n<text x=\"965\" y=\"140\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"17\" font-weight=\"700\" fill=\"#212121\" letter-spacing=\"1.5\">The critical field<\u002Ftext>\n<text x=\"965\" y=\"160\" text-anchor=\"middle\" font-family=\"Segoe UI,Arial,sans-serif\" font-size=\"11\" font-style=\"italic\" fill=\"#4C4C4C\">The terms of this debate are being set by people outside the industry.<\u002Ftext>\n<g class=\"fb\" data-tip=\"Trust replaces risk as framing\" data-desc=\"The industry's organising concept shifted from 'mitigating risk' to 'enabling trust' between 2018 and 2024 — a reframing with commercial and regulatory consequences.\"><circle cx=\"915\" cy=\"245\" r=\"48\" fill=\"#fff\" stroke=\"#A84A2E\" stroke-opacity=\".4\" class=\"fr\"><\u002Fcircle><text x=\"915\" y=\"239\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">Trust replaces<\u002Ftext><text x=\"915\" y=\"253\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">risk as framing<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"'Platform work' is now a legal term\" data-desc=\"What began as academic vocabulary (Srnicek 2016, Woodcock and Graham 2020) is now codified in EU law. The category exists because the critical field named it.\"><circle cx=\"1020\" cy=\"250\" r=\"46\" fill=\"#fff\" stroke=\"#A84A2E\" stroke-opacity=\".4\" class=\"fr\"><\u002Fcircle><text x=\"1020\" y=\"244\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">'Platform work'<\u002Ftext><text x=\"1020\" y=\"258\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">now a legal term<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Fairwork ratings enter procurement\" data-desc=\"Oxford's Fairwork project rates platforms on labour standards. By 2025 its scores are used in public procurement decisions across EU member states.\"><circle cx=\"915\" cy=\"320\" r=\"30\" fill=\"#fff\" stroke=\"#A84A2E\" stroke-opacity=\".25\" class=\"fr\"><\u002Fcircle><text x=\"915\" y=\"317\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">Fairwork in<\u002Ftext><text x=\"915\" y=\"328\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">procurement<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Algorithmic manager named and contested\" data-desc=\"The concept of the 'algorithmic manager' has moved from academic critique to regulatory language and worker organising.\"><circle cx=\"1015\" cy=\"325\" r=\"30\" fill=\"#fff\" stroke=\"#A84A2E\" stroke-opacity=\".25\" class=\"fr\"><\u002Fcircle><text x=\"1015\" y=\"322\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">Algorithmic mgr<\u002Ftext><text x=\"1015\" y=\"333\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">contested<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Platform cooperativism\" data-desc=\"Scholz's cooperative platform model offers a structural alternative. Small in practice but influential in EU policy framing.\"><circle cx=\"965\" cy=\"378\" r=\"22\" fill=\"#fff\" stroke=\"#A84A2E\" stroke-opacity=\".18\" class=\"fr\"><\u002Fcircle><text x=\"965\" y=\"376\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"8\" fill=\"#4C4C4C\">Platform<\u002Ftext><text x=\"965\" y=\"386\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"8\" fill=\"#4C4C4C\">cooperativism<\u002Ftext><\u002Fg>\n<circle cx=\"1070\" cy=\"370\" r=\"5\" fill=\"#A84A2E\" fill-opacity=\".22\"><\u002Fcircle><circle cx=\"870\" cy=\"355\" r=\"4\" fill=\"#A84A2E\" fill-opacity=\".18\"><\u002Fcircle><circle cx=\"1080\" cy=\"295\" r=\"4\" fill=\"#A84A2E\" fill-opacity=\".18\"><\u002Fcircle>\n<\u002Fg>\n\n<g class=\"dg\" data-domain=\"identity\">\n<circle cx=\"995\" cy=\"640\" r=\"165\" fill=\"#DCF0EC\" fill-opacity=\".85\"><\u002Fcircle>\n<circle cx=\"995\" cy=\"640\" r=\"165\" fill=\"none\" stroke=\"#005656\" stroke-opacity=\".3\" stroke-width=\"1\"><\u002Fcircle>\n<text x=\"995\" y=\"825\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"16\" font-weight=\"700\" fill=\"#212121\" letter-spacing=\"1.5\">Identity and trust infrastructure<\u002Ftext>\n<text x=\"995\" y=\"845\" text-anchor=\"middle\" font-family=\"Segoe UI,Arial,sans-serif\" font-size=\"11\" font-style=\"italic\" fill=\"#4C4C4C\">The product category is being redefined while incumbents sell the old one.<\u002Ftext>\n<g class=\"fb\" data-tip=\"Identity unbundles from screening\" data-desc=\"Identity verification (who is this person?) is separating from background screening (what has this person done?). The Persona and Yardstik partnership (Jun 2025) is structural evidence.\"><circle cx=\"940\" cy=\"595\" r=\"50\" fill=\"#fff\" stroke=\"#005656\" stroke-opacity=\".4\" class=\"fr\"><\u002Fcircle><text x=\"940\" y=\"589\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">Identity unbundles<\u002Ftext><text x=\"940\" y=\"603\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">from screening<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Continuous assurance replaces one-time check\" data-desc=\"When 1 in 4 profiles could be fake, a check at onboarding is not a product — it is a leak. The shift from point-in-time to ongoing monitoring.\"><circle cx=\"1055\" cy=\"600\" r=\"48\" fill=\"#fff\" stroke=\"#005656\" stroke-opacity=\".4\" class=\"fr\"><\u002Fcircle><text x=\"1055\" y=\"594\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">Continuous<\u002Ftext><text x=\"1055\" y=\"608\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">assurance<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Reusable credentials architecture\" data-desc=\"Trua's TruaScore (FICO-like 0-360), EUDI wallets, DIATF — the architecture shifts from 'run a check each time' to 'carry a credential you own.'\"><circle cx=\"935\" cy=\"668\" r=\"30\" fill=\"#fff\" stroke=\"#005656\" stroke-opacity=\".25\" class=\"fr\"><\u002Fcircle><text x=\"935\" y=\"665\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">Reusable<\u002Ftext><text x=\"935\" y=\"676\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">credentials<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Digital ID wallets arriving by regulation\" data-desc=\"EUDI mandatory for all EU member states by end 2026. UK DIATF certifying providers. 4.5M+ mobile driver's licenses in US wallets.\"><circle cx=\"1050\" cy=\"673\" r=\"30\" fill=\"#fff\" stroke=\"#005656\" stroke-opacity=\".25\" class=\"fr\"><\u002Fcircle><text x=\"1050\" y=\"670\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">Digital ID<\u002Ftext><text x=\"1050\" y=\"681\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">wallets<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Biometric liveness as standard\" data-desc=\"Post-deepfake, liveness detection with facial recognition has moved from premium add-on to baseline requirement.\"><circle cx=\"985\" cy=\"730\" r=\"22\" fill=\"#fff\" stroke=\"#005656\" stroke-opacity=\".18\" class=\"fr\"><\u002Fcircle><text x=\"985\" y=\"728\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"8\" fill=\"#4C4C4C\">Biometric<\u002Ftext><text x=\"985\" y=\"738\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"8\" fill=\"#4C4C4C\">liveness<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"AI anomaly detection\" data-desc=\"Machine learning trained on 190M+ annual screenings to flag statistical anomalies in resume patterns, timing, and jurisdictions.\"><circle cx=\"1058\" cy=\"733\" r=\"20\" fill=\"#fff\" stroke=\"#005656\" stroke-opacity=\".18\" class=\"fr\"><\u002Fcircle><text x=\"1058\" y=\"731\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"8\" fill=\"#4C4C4C\">AI anomaly<\u002Ftext><text x=\"1058\" y=\"741\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"8\" fill=\"#4C4C4C\">detection<\u002Ftext><\u002Fg>\n<circle cx=\"900\" cy=\"640\" r=\"5\" fill=\"#005656\" fill-opacity=\".22\"><\u002Fcircle><circle cx=\"1100\" cy=\"650\" r=\"4\" fill=\"#005656\" fill-opacity=\".2\"><\u002Fcircle><circle cx=\"1090\" cy=\"570\" r=\"4\" fill=\"#005656\" fill-opacity=\".18\"><\u002Fcircle><circle cx=\"910\" cy=\"720\" r=\"4\" fill=\"#005656\" fill-opacity=\".15\"><\u002Fcircle><circle cx=\"1010\" cy=\"555\" r=\"3\" fill=\"#005656\" fill-opacity=\".12\"><\u002Fcircle>\n<\u002Fg>\n\n<g class=\"dg\" data-domain=\"threats\">\n<circle cx=\"660\" cy=\"785\" r=\"135\" fill=\"#FBE8E3\" fill-opacity=\".85\"><\u002Fcircle>\n<circle cx=\"660\" cy=\"785\" r=\"135\" fill=\"none\" stroke=\"#C23B22\" stroke-opacity=\".3\" stroke-width=\"1\"><\u002Fcircle>\n<text x=\"660\" y=\"935\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"17\" font-weight=\"700\" fill=\"#212121\" letter-spacing=\"1.5\">The threat landscape<\u002Ftext>\n<text x=\"660\" y=\"953\" text-anchor=\"middle\" font-family=\"Segoe UI,Arial,sans-serif\" font-size=\"11\" font-style=\"italic\" fill=\"#4C4C4C\">The attack surface is growing faster than the defence.<\u002Ftext>\n<g class=\"fb\" data-tip=\"Deepfake-as-a-Service arrives\" data-desc=\"Commercial deepfake tools now available as subscription services. 1,400% increase in attacks H1 2024 (Pindrop). The barrier to identity fraud has collapsed.\"><circle cx=\"615\" cy=\"748\" r=\"42\" fill=\"#fff\" stroke=\"#C23B22\" stroke-opacity=\".4\" class=\"fr\"><\u002Fcircle><text x=\"615\" y=\"742\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">Deepfake-as-a-<\u002Ftext><text x=\"615\" y=\"756\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">Service<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"1 in 4 profiles fake by 2028\" data-desc=\"Gartner projects 25% of job applications will be fraudulent by 2028 — up from 17% reporting deepfakes in 2025 applications.\"><circle cx=\"710\" cy=\"752\" r=\"40\" fill=\"#fff\" stroke=\"#C23B22\" stroke-opacity=\".4\" class=\"fr\"><\u002Fcircle><text x=\"710\" y=\"746\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">1 in 4 profiles<\u002Ftext><text x=\"710\" y=\"760\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">fake by 2028<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"NK operatives in 300+ US firms\" data-desc=\"DOJ indictments (Jun 2025) revealed North Korean IT workers infiltrated 300+ companies using stolen identities. State-actor threat meets consumer-grade hiring.\"><circle cx=\"620\" cy=\"818\" r=\"28\" fill=\"#fff\" stroke=\"#C23B22\" stroke-opacity=\".25\" class=\"fr\"><\u002Fcircle><text x=\"620\" y=\"815\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">NK operatives<\u002Ftext><text x=\"620\" y=\"826\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">in 300+ firms<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Interview proxy fraud\" data-desc=\"Candidates hiring proxies (human or AI) to attend interviews. The practice has moved from edge case to systemic risk in remote hiring.\"><circle cx=\"705\" cy=\"818\" r=\"26\" fill=\"#fff\" stroke=\"#C23B22\" stroke-opacity=\".25\" class=\"fr\"><\u002Fcircle><text x=\"705\" y=\"815\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">Interview proxy<\u002Ftext><text x=\"705\" y=\"826\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">fraud<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Synthetic identity at scale\" data-desc=\"Fabricated identities combining real and fake data. No victim to report the fraud, making detection structurally harder.\"><circle cx=\"660\" cy=\"862\" r=\"20\" fill=\"#fff\" stroke=\"#C23B22\" stroke-opacity=\".18\" class=\"fr\"><\u002Fcircle><text x=\"660\" y=\"860\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"8\" fill=\"#4C4C4C\">Synthetic<\u002Ftext><text x=\"660\" y=\"870\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"8\" fill=\"#4C4C4C\">identity<\u002Ftext><\u002Fg>\n<circle cx=\"588\" cy=\"780\" r=\"5\" fill=\"#C23B22\" fill-opacity=\".25\"><\u002Fcircle><circle cx=\"745\" cy=\"780\" r=\"4\" fill=\"#C23B22\" fill-opacity=\".2\"><\u002Fcircle><circle cx=\"685\" cy=\"700\" r=\"4\" fill=\"#C23B22\" fill-opacity=\".15\"><\u002Fcircle>\n<\u002Fg>\n\n<g class=\"dg\" data-domain=\"platforms\">\n<circle cx=\"270\" cy=\"610\" r=\"170\" fill=\"#E8F3F1\" fill-opacity=\".85\"><\u002Fcircle>\n<circle cx=\"270\" cy=\"610\" r=\"170\" fill=\"none\" stroke=\"#005656\" stroke-opacity=\".3\" stroke-width=\"1\"><\u002Fcircle>\n<text x=\"270\" y=\"805\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"17\" font-weight=\"700\" fill=\"#212121\" letter-spacing=\"1.5\">The platforms<\u002Ftext>\n<text x=\"270\" y=\"825\" text-anchor=\"middle\" font-family=\"Segoe UI,Arial,sans-serif\" font-size=\"11\" font-style=\"italic\" fill=\"#4C4C4C\">Consumer gig and enterprise contingent are becoming different industries.<\u002Ftext>\n<g class=\"fb\" data-tip=\"Platform model bifurcates\" data-desc=\"Consumer gig (DoorDash, Uber) and enterprise contingent (Toptal, Upwork Enterprise) diverge in economics, buyer expectations, and regulatory exposure.\"><circle cx=\"218\" cy=\"563\" r=\"48\" fill=\"#fff\" stroke=\"#005656\" stroke-opacity=\".4\" class=\"fr\"><\u002Fcircle><text x=\"218\" y=\"557\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">Platform model<\u002Ftext><text x=\"218\" y=\"571\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">bifurcates<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Ride-hail pulled into employment\" data-desc=\"EU PWD's direct impact on Uber, Bolt, and Lyft's European operations. Presumption of employment reshapes economics and screening obligations.\"><circle cx=\"330\" cy=\"568\" r=\"45\" fill=\"#fff\" stroke=\"#005656\" stroke-opacity=\".4\" class=\"fr\"><\u002Fcircle><text x=\"330\" y=\"562\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">Ride-hail into<\u002Ftext><text x=\"330\" y=\"576\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">employment<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Gig absorbs shift work\" data-desc=\"ShiftMed, Wonolo, and similar apps collapse the boundary between gig work and traditional shift-based employment.\"><circle cx=\"215\" cy=\"640\" r=\"28\" fill=\"#fff\" stroke=\"#005656\" stroke-opacity=\".25\" class=\"fr\"><\u002Fcircle><text x=\"215\" y=\"637\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">Gig absorbs<\u002Ftext><text x=\"215\" y=\"648\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">shift work<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Freelance to enterprise SOW\" data-desc=\"Upwork Enterprise, Toptal premium — professional freelancing is becoming statement-of-work contracting with enterprise procurement expectations.\"><circle cx=\"328\" cy=\"643\" r=\"28\" fill=\"#fff\" stroke=\"#005656\" stroke-opacity=\".25\" class=\"fr\"><\u002Fcircle><text x=\"328\" y=\"640\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">Freelance to<\u002Ftext><text x=\"328\" y=\"651\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">enterprise SOW<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Platform-of-platforms\" data-desc=\"Bullhorn, Staffing Engine — aggregators creating meta-platforms that sit above individual gig marketplaces.\"><circle cx=\"225\" cy=\"700\" r=\"22\" fill=\"#fff\" stroke=\"#005656\" stroke-opacity=\".18\" class=\"fr\"><\u002Fcircle><text x=\"225\" y=\"698\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"8\" fill=\"#4C4C4C\">Platform-of-<\u002Ftext><text x=\"225\" y=\"708\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"8\" fill=\"#4C4C4C\">platforms<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Healthcare staffing apps\" data-desc=\"ShiftMed, connectRN, Clipboard Health — credential-heavy, speed-critical hiring at volume. The hardest screening problem in the gig economy.\"><circle cx=\"320\" cy=\"705\" r=\"22\" fill=\"#fff\" stroke=\"#005656\" stroke-opacity=\".18\" class=\"fr\"><\u002Fcircle><text x=\"320\" y=\"703\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"8\" fill=\"#4C4C4C\">Healthcare<\u002Ftext><text x=\"320\" y=\"713\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"8\" fill=\"#4C4C4C\">staffing<\u002Ftext><\u002Fg>\n<circle cx=\"170\" cy=\"580\" r=\"5\" fill=\"#005656\" fill-opacity=\".2\"><\u002Fcircle><circle cx=\"375\" cy=\"700\" r=\"4\" fill=\"#005656\" fill-opacity=\".18\"><\u002Fcircle><circle cx=\"165\" cy=\"650\" r=\"4\" fill=\"#005656\" fill-opacity=\".15\"><\u002Fcircle><circle cx=\"270\" cy=\"740\" r=\"4\" fill=\"#005656\" fill-opacity=\".12\"><\u002Fcircle>\n<\u002Fg>\n\n<g class=\"dg\" data-domain=\"workers\">\n<circle cx=\"215\" cy=\"260\" r=\"140\" fill=\"#FFF4D4\" fill-opacity=\".85\"><\u002Fcircle>\n<circle cx=\"215\" cy=\"260\" r=\"140\" fill=\"none\" stroke=\"#B8860B\" stroke-opacity=\".3\" stroke-width=\"1\"><\u002Fcircle>\n<text x=\"215\" y=\"105\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"17\" font-weight=\"700\" fill=\"#212121\" letter-spacing=\"1.5\">The workers<\u002Ftext>\n<text x=\"215\" y=\"125\" text-anchor=\"middle\" font-family=\"Segoe UI,Arial,sans-serif\" font-size=\"11\" font-style=\"italic\" fill=\"#4C4C4C\">Fragmented across platforms, invisible to the systems verifying them.<\u002Ftext>\n<g class=\"fb\" data-tip=\"Multi-platform identity is the norm\" data-desc=\"The average gig worker uses 3-5 platforms simultaneously. Their identity is fragmented across each. No single platform holds the whole picture.\"><circle cx=\"170\" cy=\"225\" r=\"45\" fill=\"#fff\" stroke=\"#B8860B\" stroke-opacity=\".4\" class=\"fr\"><\u002Fcircle><text x=\"170\" y=\"219\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">Multi-platform<\u002Ftext><text x=\"170\" y=\"233\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">identity<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Workers rejecting the 'gig' label\" data-desc=\"MBO Partners 2025: independent professionals increasingly refuse the 'gig worker' framing — demanding language that reflects skill and autonomy.\"><circle cx=\"265\" cy=\"230\" r=\"42\" fill=\"#fff\" stroke=\"#B8860B\" stroke-opacity=\".4\" class=\"fr\"><\u002Fcircle><text x=\"265\" y=\"224\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">Rejecting the<\u002Ftext><text x=\"265\" y=\"238\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"11\" fill=\"#212121\">'gig' label<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Indie unions build discursive power\" data-desc=\"ADCU, Gig Workers Rising, IWGB — worker organising reshapes public narrative and feeds directly into regulatory processes.\"><circle cx=\"172\" cy=\"305\" r=\"30\" fill=\"#fff\" stroke=\"#B8860B\" stroke-opacity=\".25\" class=\"fr\"><\u002Fcircle><text x=\"172\" y=\"302\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">Indie unions<\u002Ftext><text x=\"172\" y=\"313\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">build power<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Candidate fraud from worker side\" data-desc=\"6% of candidates admit to interview fraud (Gartner 2025). The threat landscape is not only external.\"><circle cx=\"262\" cy=\"310\" r=\"28\" fill=\"#fff\" stroke=\"#B8860B\" stroke-opacity=\".25\" class=\"fr\"><\u002Fcircle><text x=\"262\" y=\"307\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">Candidate fraud<\u002Ftext><text x=\"262\" y=\"318\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"9\" fill=\"#212121\">from workers<\u002Ftext><\u002Fg>\n<g class=\"fb\" data-tip=\"Portable work history\" data-desc=\"Workers expect verified employment history, credentials, and trust scores to travel with them — not start from zero each time.\"><circle cx=\"215\" cy=\"362\" r=\"22\" fill=\"#fff\" stroke=\"#B8860B\" stroke-opacity=\".18\" class=\"fr\"><\u002Fcircle><text x=\"215\" y=\"360\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"8\" fill=\"#4C4C4C\">Portable work<\u002Ftext><text x=\"215\" y=\"370\" text-anchor=\"middle\" font-family=\"Franklin Gothic Medium,Arial,sans-serif\" font-size=\"8\" fill=\"#4C4C4C\">history<\u002Ftext><\u002Fg>\n<circle cx=\"135\" cy=\"260\" r=\"5\" fill=\"#B8860B\" fill-opacity=\".2\"><\u002Fcircle><circle cx=\"310\" cy=\"275\" r=\"4\" fill=\"#B8860B\" fill-opacity=\".18\"><\u002Fcircle><circle cx=\"145\" cy=\"345\" r=\"4\" fill=\"#B8860B\" fill-opacity=\".15\"><\u002Fcircle>\n<\u002Fg>\n\n<g id=\"bridge-cards\">\n<g class=\"bc\" data-bridge=\"regulators\"><text x=\"600\" y=\"370\" text-anchor=\"middle\" font-family=\"Segoe UI,Arial,sans-serif\" font-size=\"10\" font-style=\"italic\" fill=\"#005656\">Compliance becomes orchestration.<\u002Ftext><text x=\"600\" y=\"384\" text-anchor=\"middle\" font-family=\"Segoe UI,Arial,sans-serif\" font-size=\"10\" font-style=\"italic\" fill=\"#005656\">Not paperwork.<\u002Ftext><\u002Fg>\n<g class=\"bc\" data-bridge=\"critical\"><text x=\"820\" y=\"405\" text-anchor=\"middle\" font-family=\"Segoe UI,Arial,sans-serif\" font-size=\"10\" font-style=\"italic\" fill=\"#005656\">The vocabulary is being
